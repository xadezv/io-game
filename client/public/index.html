<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>IO Game</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap"
    rel="stylesheet"
  />

  <style>
    /* =============================================
       RESET & BASE
    ============================================= */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Fredoka One', sans-serif;
    }

    /* =============================================
       GAME CANVAS
    ============================================= */
    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: crosshair;
    }

    /* =============================================
       CHAT
    ============================================= */
    .chat-container {
      position: fixed;
      bottom: 230px;
      left: 14px;
      width: 280px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 0;
      pointer-events: none;
    }

    .chat-log {
      max-height: 160px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 6px 8px;
      background: rgba(0, 0, 0, 0.45);
      border-radius: 8px 8px 0 0;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-bottom: none;
      backdrop-filter: blur(4px);
      scrollbar-width: none;
    }

    .chat-log::-webkit-scrollbar {
      display: none;
    }

    .chat-log .chat-message {
      display: flex;
      gap: 5px;
      line-height: 1.3;
      font-size: 12px;
      font-family: 'Fredoka One', sans-serif;
      word-break: break-word;
    }

    .chat-log .chat-message .chat-author {
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .chat-log .chat-message .chat-text {
      color: rgba(255, 255, 255, 0.9);
    }

    .chat-input {
      width: 100%;
      padding: 6px 10px;
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 0 0 8px 8px;
      color: #fff;
      font-family: 'Fredoka One', sans-serif;
      font-size: 13px;
      outline: none;
      pointer-events: auto;
      transition: border-color 0.2s, background 0.2s;
      caret-color: #a78bfa;
    }

    .chat-input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    .chat-input:focus {
      border-color: rgba(167, 139, 250, 0.7);
      background: rgba(10, 10, 20, 0.85);
    }

    /* =============================================
       LEADERBOARD
    ============================================= */
    .leaderboard {
      position: fixed;
      top: 14px;
      right: 14px;
      width: 200px;
      z-index: 100;
      background: rgba(5, 5, 15, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
      pointer-events: none;
      user-select: none;
    }

    .leaderboard-header {
      padding: 7px 10px 5px;
      background: rgba(124, 58, 237, 0.35);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .leaderboard-row {
      display: flex;
      align-items: center;
      padding: 3px 10px;
      gap: 6px;
      font-size: 12px;
    }

    .leaderboard-row.rank-1 {
      background: rgba(251, 191, 36, 0.08);
    }

    .leaderboard-rank {
      min-width: 22px;
      text-align: center;
      color: rgba(255, 255, 255, 0.45);
    }

    .leaderboard-name {
      flex: 1;
      color: rgba(255, 255, 255, 0.88);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .leaderboard-points {
      color: rgba(255, 255, 255, 0.5);
      white-space: nowrap;
      font-size: 11px;
    }

    .leaderboard-divider {
      height: 1px;
      margin: 0 8px;
      background: rgba(255, 255, 255, 0.05);
    }

    /* =============================================
       MINIMAP
    ============================================= */
    .minimap-canvas {
      position: fixed;
      top: 14px;
      left: 14px;
      width: 160px;
      height: 160px;
      border-radius: 10px;
      border: 2px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.55);
      z-index: 100;
      pointer-events: none;
      image-rendering: pixelated;
    }

    /* =============================================
       LOBBY OVERLAY
    ============================================= */
    .lobby-overlay {
      position: fixed;
      inset: 0;
      z-index: 400;
      background: radial-gradient(ellipse at 50% 40%, #0f0a1e 0%, #050510 60%, #000 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .lobby-card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      padding: 50px 60px 44px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow:
        0 0 80px rgba(124, 58, 237, 0.15),
        0 16px 60px rgba(0, 0, 0, 0.6);
      min-width: 340px;
      animation: lobbyFadeIn 0.5s ease both;
    }

    .lobby-title {
      font-size: 64px;
      font-weight: 400;
      color: #fff;
      letter-spacing: 4px;
      animation: titlePulse 3s ease-in-out infinite;
      line-height: 1;
    }

    .lobby-tagline {
      font-size: 15px;
      color: rgba(167, 139, 250, 0.7);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .lobby-nick-input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1.5px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      color: #fff;
      font-family: 'Fredoka One', sans-serif;
      font-size: 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 0.5px;
      outline: none;
      caret-color: #a78bfa;
    }

    .lobby-nick-input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    .lobby-nick-input:focus {
      border-color: rgba(167, 139, 250, 0.8);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
    }

    .lobby-play-btn {
      width: 100%;
      padding: 14px 0;
      background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
      border: none;
      border-radius: 50px;
      color: #fff;
      font-family: 'Fredoka One', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 4px 32px rgba(124, 58, 237, 0.55);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .lobby-play-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 48px rgba(124, 58, 237, 0.8);
    }

    .lobby-play-btn:active {
      transform: scale(0.97);
    }

    /* =============================================
       DEATH SCREEN
    ============================================= */
    .death-screen {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      transition: background 0.6s ease, backdrop-filter 0.6s ease;
    }

    .death-screen.visible {
      background: rgba(20, 0, 0, 0.72);
      backdrop-filter: blur(6px);
    }

    .death-card {
      background: rgba(10, 5, 20, 0.88);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: 16px;
      padding: 40px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      box-shadow:
        0 0 60px rgba(239, 68, 68, 0.25),
        0 8px 40px rgba(0, 0, 0, 0.7);
      animation: deathCardIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .death-title {
      font-size: 52px;
      font-weight: 400;
      color: #ef4444;
      text-shadow: 0 0 30px rgba(239, 68, 68, 0.7);
      letter-spacing: 2px;
    }

    .death-score-label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .death-score-value {
      font-size: 40px;
      color: #fbbf24;
      text-shadow: 0 0 16px rgba(251, 191, 36, 0.5);
    }

    .death-respawn-btn {
      padding: 12px 48px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none;
      border-radius: 50px;
      color: #fff;
      font-family: 'Fredoka One', sans-serif;
      font-size: 20px;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 4px 24px rgba(124, 58, 237, 0.5);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .death-respawn-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 32px rgba(124, 58, 237, 0.7);
    }

    /* =============================================
       CRAFT HINT
    ============================================= */
    .craft-hint {
      position: fixed;
      bottom: 14px;
      right: 14px;
      z-index: 90;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      padding: 5px 10px;
      font-family: 'Fredoka One', sans-serif;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.5px;
      pointer-events: none;
      user-select: none;
      backdrop-filter: blur(4px);
    }

    /* =============================================
       ANIMATIONS
    ============================================= */
    @keyframes lobbyFadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes titlePulse {
      0%, 100% {
        text-shadow:
          0 0 20px rgba(167, 139, 250, 0.4),
          0 0 60px rgba(124, 58, 237, 0.2);
      }
      50% {
        text-shadow:
          0 0 40px rgba(167, 139, 250, 0.8),
          0 0 100px rgba(124, 58, 237, 0.5);
      }
    }

    @keyframes deathCardIn {
      from {
        transform: scale(0.7) translateY(40px);
        opacity: 0;
      }
      to {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    @keyframes floatParticle {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.6;
      }
      50% {
        transform: translateY(-30px) rotate(180deg);
        opacity: 0.3;
      }
      100% {
        transform: translateY(0) rotate(360deg);
        opacity: 0.6;
      }
    }

    /* =============================================
       MISC UTILITY
    ============================================= */

    /* Prevent canvas context menu on right-click */
    #gameCanvas {
      -webkit-user-select: none;
      user-select: none;
    }

    /* Custom selection */
    ::selection {
      background: rgba(124, 58, 237, 0.4);
    }

    /* Scrollbar (fallback for browsers that show them) */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
    }

    /* Mobile touch fix */
    body {
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>

  <!-- Main game canvas -->
  <canvas id="gameCanvas"></canvas>

  <!-- Crafting keyboard hint (bottom-right) -->
  <div class="craft-hint">C — Craft &nbsp;|&nbsp; T — Chat &nbsp;|&nbsp; WASD — Move</div>

  <!-- Socket.IO (must load before bundle) -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <!-- Hot reload: dev-only, listens for bundle rebuild signal from server -->
  <script>
    (function () {
      var _hr = io('/', { transports: ['websocket'] });
      _hr.on('__reload__', function () {
        console.log('[HMR] Reloading…');
        location.reload();
      });
    })();
  </script>

  <!-- Startup error catcher — visible red overlay if bundle crashes -->
  <script>
    window.onerror = function(msg, src, line, col, err) {
      var d = document.getElementById('__err');
      if (!d) {
        d = document.createElement('div');
        d.id = '__err';
        d.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#1a0000;color:#ff6666;font:14px monospace;padding:30px;white-space:pre-wrap;overflow:auto;';
        document.body.appendChild(d);
      }
      d.textContent += 'ERROR: ' + msg + '\n  at ' + src + ':' + line + ':' + col + '\n' + (err && err.stack ? err.stack : '') + '\n\n';
    };
    window.onunhandledrejection = function(e) {
      var d = document.getElementById('__err');
      if (!d) {
        d = document.createElement('div');
        d.id = '__err';
        d.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#1a0000;color:#ff6666;font:14px monospace;padding:30px;white-space:pre-wrap;overflow:auto;';
        document.body.appendChild(d);
      }
      d.textContent += 'UNHANDLED: ' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)) + '\n\n';
    };
  </script>

  <!-- Game bundle -->
  <script src="bundle.js?v=2" defer></script>

</body>
</html>
